name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --fix bot/ tests/"
      
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format bot/ tests/"
      
      # Commit fixes back if on a branch (not on main)
      - name: Commit lint fixes
        if: github.ref != 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/ tests/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-format with ruff"
          git push
        continue-on-error: true

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
<<<<<<< Updated upstream
          python-version: '3.13'
      
=======
          python-version: '3.13.13'
>>>>>>> Stashed changes
      - run: pip install -e '.[dev]'
      
      - run: mypy bot/ml/filter.py bot/confluence.py --follow-imports=skip --ignore-missing-imports

  typecheck-full-report:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
<<<<<<< Updated upstream
          python-version: '3.13'
      
=======
          python-version: '3.13.13'
>>>>>>> Stashed changes
      - run: pip install -e '.[dev]'
      
      - run: mypy bot/ --ignore-missing-imports --strict

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
<<<<<<< Updated upstream
          python-version: '3.13'
      
=======
          python-version: '3.13.13'
>>>>>>> Stashed changes
      - run: pip install -e '.[dev,test]'
      
      - run: pytest tests/ -v --cov=bot --cov-report=xml
      
      - uses: codecov/codecov-action@v5
