name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check bot/ tests/

      - name: Ruff format check
        run: ruff format --check bot/ tests/

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"
          cache: "pip"

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Focused mypy gate
        run: mypy bot/ml/filter.py bot/confluence.py --follow-imports=skip --ignore-missing-imports

  tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run full test suite with coverage gate
        run: |
          pytest tests/ -v --cov=bot --cov-report=xml --cov-fail-under=60

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5

  tests-matrix:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13.12", "3.13.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run smoke tests on matrix
        run: |
          pytest -q \
            tests/test_sanity.py \
            tests/test_event_bus.py \
            tests/test_config_intelligence.py \
            tests/test_filters.py \
            tests/test_remediation_regressions.py \
            --maxfail=1
