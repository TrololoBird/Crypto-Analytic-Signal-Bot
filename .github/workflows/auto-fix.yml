name: Auto Fix & Format

on:
  push:
    branches: [main, develop]
    paths:
      - "bot/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autofix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"
          cache: "pip"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Fix with ruff
        run: |
          ruff check --fix bot/ tests/
          ruff format bot/ tests/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "chore: auto-format with ruff"
          title: "🤖 Auto: format with ruff"
          body: |
            Automatic formatting and linting fixes:
            - Fixed import sorting
            - Fixed style issues
            - Applied formatting rules
          branch: chore/auto-format
          delete-branch: true
          labels: automated,formatting
